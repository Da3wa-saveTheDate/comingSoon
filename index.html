<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أچواء · Ajwaa — Coming Soon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Naskh+Arabic:wght@400;500;600&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">

<style>

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }



  :root {

    --gold: #c9a96e;

    --gold-light: #e8d5a3;

    --gold-dark: #8b6914;

    --ivory: #f5f0e8;

    --deep: #0a0806;

    --deep2: #110e09;

  }



  html, body {

    width: 100%; height: 100%;

    background: var(--deep);

    overflow: hidden;

    font-family: 'Cormorant Garamond', serif;

  }



  canvas#particles {

    position: fixed;

    inset: 0;

    z-index: 0;

    pointer-events: none;

  }



  .vignette {

    position: fixed;

    inset: 0;

    z-index: 1;

    background: radial-gradient(ellipse at center, transparent 30%, rgba(5,4,2,0.85) 100%);

    pointer-events: none;

  }



  .scene {

    position: fixed;

    inset: 0;

    z-index: 2;

    display: flex;

    flex-direction: column;

    align-items: center;

    justify-content: center;

    text-align: center;

    padding: 2rem;

  }



  .top-line {

    position: absolute;

    top: 2.5rem;

    left: 50%;

    transform: translateX(-50%);

    display: flex;

    align-items: center;

    gap: 1.2rem;

    opacity: 0;

    animation: fadeUp 1.2s ease 0.3s forwards;

  }

  .top-line span {

    font-family: 'Cinzel', serif;

    font-size: 0.62rem;

    letter-spacing: 0.35em;

    color: var(--gold);

    text-transform: uppercase;

    font-weight: 300;

  }

  .ornament {

    width: 42px; height: 1px;

    background: linear-gradient(90deg, transparent, var(--gold), transparent);

  }



  .brand-wrap {

    display: flex;

    flex-direction: column;

    align-items: center;

    gap: 0.4rem;

  }



  .arabic-name {

    font-family: 'Noto Naskh Arabic', serif;

    font-size: clamp(5rem, 16vw, 9rem);

    font-weight: 400;

    color: transparent;

    background: linear-gradient(160deg, #e8d5a3 0%, #c9a96e 40%, #f0e0b0 65%, #a0782a 100%);

    -webkit-background-clip: text;

    background-clip: text;

    line-height: 1.1;

    letter-spacing: 0.02em;

    opacity: 0;

    animation: fadeUp 1.4s ease 0.6s forwards;

    filter: drop-shadow(0 0 40px rgba(201,169,110,0.25));

  }



  .divider-wrap {

    display: flex;

    align-items: center;

    gap: 1rem;

    opacity: 0;

    animation: fadeUp 1.2s ease 1s forwards;

    margin: 0.6rem 0;

  }

  .divider-line {

    width: 60px; height: 0.5px;

    background: linear-gradient(90deg, transparent, var(--gold));

  }

  .divider-line.right {

    background: linear-gradient(90deg, var(--gold), transparent);

  }

  .divider-diamond {

    width: 5px; height: 5px;

    background: var(--gold);

    transform: rotate(45deg);

  }



  .latin-name {

    font-family: 'Cinzel', serif;

    font-size: clamp(0.7rem, 2.5vw, 1rem);

    letter-spacing: 0.55em;

    font-weight: 300;

    color: var(--gold-light);

    opacity: 0;

    animation: fadeUp 1.2s ease 1.1s forwards;

  }



  .coming-label {

    margin-top: 2.5rem;

    opacity: 0;

    animation: fadeUp 1.2s ease 1.5s forwards;

  }

  .coming-label span {

    font-family: 'Cormorant Garamond', serif;

    font-style: italic;

    font-size: clamp(1rem, 3vw, 1.45rem);

    color: var(--ivory);

    letter-spacing: 0.15em;

    font-weight: 300;

    opacity: 0.75;

  }



  .tagline {

    margin-top: 1.1rem;

    opacity: 0;

    animation: fadeUp 1.2s ease 1.8s forwards;

  }

  .tagline p {

    font-family: 'Noto Naskh Arabic', serif;

    font-size: clamp(0.8rem, 2vw, 1rem);

    color: rgba(232, 213, 163, 0.5);

    line-height: 1.8;

    letter-spacing: 0.03em;

    font-weight: 400;

  }



  .bottom-bar {

    position: absolute;

    bottom: 2rem;

    left: 50%;

    transform: translateX(-50%);

    opacity: 0;

    animation: fadeUp 1.2s ease 2.2s forwards;

    display: flex;

    flex-direction: column;

    align-items: center;

    gap: 0.7rem;

  }

  .bottom-bar a {

    font-family: 'Cinzel', serif;

    font-size: 0.58rem;

    letter-spacing: 0.3em;

    color: rgba(201,169,110,0.45);

    text-decoration: none;

    text-transform: uppercase;

    transition: color 0.3s;

  }

  .bottom-bar a:hover { color: var(--gold); }

  .bottom-dots { display: flex; gap: 6px; align-items: center; }

  .bottom-dots span {

    width: 3px; height: 3px;

    border-radius: 50%;

    background: rgba(201,169,110,0.3);

  }

  .bottom-dots span:nth-child(2) { background: rgba(201,169,110,0.6); }



  .shimmer-line {

    position: fixed;

    height: 1px;

    background: linear-gradient(90deg, transparent 0%, rgba(201,169,110,0.12) 50%, transparent 100%);

    z-index: 1;

    pointer-events: none;

  }

  .shimmer-line.top { top: 18%; left: 0; right: 0; }

  .shimmer-line.bottom { bottom: 18%; left: 0; right: 0; }



  .corner {

    position: fixed;

    z-index: 2;

    pointer-events: none;

    opacity: 0;

    animation: fadeIn 2s ease 2s forwards;

  }

  .corner svg { display: block; }

  .corner.tl { top: 1.5rem; left: 1.5rem; }

  .corner.tr { top: 1.5rem; right: 1.5rem; transform: scaleX(-1); }

  .corner.bl { bottom: 1.5rem; left: 1.5rem; transform: scaleY(-1); }

  .corner.br { bottom: 1.5rem; right: 1.5rem; transform: scale(-1); }



  @keyframes fadeUp {

    from { opacity: 0; transform: translateY(18px); }

    to   { opacity: 1; transform: translateY(0); }

  }

  @keyframes fadeIn {

    from { opacity: 0; } to { opacity: 0.45; }

  }



  @media (max-width: 480px) {

    .corner { display: none; }

    .shimmer-line { display: none; }

    .top-line { top: 1.5rem; }

  }

</style>

</head>

<body>



<canvas id="particles"></canvas>

<div class="vignette"></div>

<div class="shimmer-line top"></div>

<div class="shimmer-line bottom"></div>



<div class="corner tl">

  <svg width="55" height="55" viewBox="0 0 55 55" fill="none">

    <path d="M2 53 L2 2 L53 2" stroke="#c9a96e" stroke-width="0.7" fill="none"/>

    <path d="M2 20 L2 2 L20 2" stroke="#c9a96e" stroke-width="1.2" fill="none"/>

    <circle cx="2" cy="2" r="2.5" fill="#c9a96e"/>

  </svg>

</div>

<div class="corner tr">

  <svg width="55" height="55" viewBox="0 0 55 55" fill="none">

    <path d="M2 53 L2 2 L53 2" stroke="#c9a96e" stroke-width="0.7" fill="none"/>

    <path d="M2 20 L2 2 L20 2" stroke="#c9a96e" stroke-width="1.2" fill="none"/>

    <circle cx="2" cy="2" r="2.5" fill="#c9a96e"/>

  </svg>

</div>

<div class="corner bl">

  <svg width="55" height="55" viewBox="0 0 55 55" fill="none">

    <path d="M2 53 L2 2 L53 2" stroke="#c9a96e" stroke-width="0.7" fill="none"/>

    <path d="M2 20 L2 2 L20 2" stroke="#c9a96e" stroke-width="1.2" fill="none"/>

    <circle cx="2" cy="2" r="2.5" fill="#c9a96e"/>

  </svg>

</div>

<div class="corner br">

  <svg width="55" height="55" viewBox="0 0 55 55" fill="none">

    <path d="M2 53 L2 2 L53 2" stroke="#c9a96e" stroke-width="0.7" fill="none"/>

    <path d="M2 20 L2 2 L20 2" stroke="#c9a96e" stroke-width="1.2" fill="none"/>

    <circle cx="2" cy="2" r="2.5" fill="#c9a96e"/>

  </svg>

</div>



<div class="scene">

  <div class="top-line">

    <div class="ornament"></div>

    <span>Comming Soon</span>

    <div class="ornament" style="background:linear-gradient(90deg,var(--gold),transparent)"></div>

  </div>



  <div class="brand-wrap">

    <div class="arabic-name">أچواء</div>

    <div class="divider-wrap">

      <div class="divider-line right"></div>

      <div class="divider-diamond"></div>

      <div class="divider-line"></div>

    </div>

    <div class="latin-name">A J W A A</div>

  </div>



  <div class="coming-label">

    <span>— Something Beautiful Is Coming —</span>

  </div>



  <div class="tagline">

    <p></p>

  </div>



  <div class="bottom-bar">

    <div class="bottom-dots">

      <span></span><span></span><span></span>

    </div>

   

  </div>

</div>



<script>

const canvas = document.getElementById('particles');

const ctx = canvas.getContext('2d');



function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

resize();

window.addEventListener('resize', resize);



const GOLD = ['rgba(201,169,110,','rgba(232,213,163,','rgba(240,224,176,','rgba(160,120,42,'];



class Particle {

  constructor() { this.reset(true); }

  reset(init) {

    this.x = Math.random() * canvas.width;

    this.y = init ? Math.random() * canvas.height : -10;

    this.size = Math.random() * 2.5 + 0.4;

    this.speedY = Math.random() * 0.4 + 0.1;

    this.speedX = (Math.random() - 0.5) * 0.25;

    this.drift = Math.random() * 0.008;

    this.driftOffset = Math.random() * Math.PI * 2;

    this.alpha = 0;

    this.maxAlpha = Math.random() * 0.55 + 0.1;

    this.fadeIn = true;

    this.color = GOLD[Math.floor(Math.random() * GOLD.length)];

    this.twinkle = Math.random() > 0.65;

    this.twinkleSpeed = Math.random() * 0.04 + 0.01;

    this.twinkleOffset = Math.random() * Math.PI * 2;

    this.isPetal = Math.random() > 0.82;

    this.angle = Math.random() * Math.PI;

    this.rotSpeed = (Math.random() - 0.5) * 0.015;

  }

  update(t) {

    this.y += this.speedY;

    this.x += this.speedX + Math.sin(t * this.drift + this.driftOffset) * 0.3;

    this.angle += this.rotSpeed;

    if (this.fadeIn) {

      this.alpha += 0.006;

      if (this.alpha >= this.maxAlpha) { this.alpha = this.maxAlpha; this.fadeIn = false; }

    }

    if (this.twinkle) {

      this.alpha = this.maxAlpha * (0.5 + 0.5 * Math.sin(t * this.twinkleSpeed + this.twinkleOffset));

    }

    if (this.y > canvas.height + 20 || this.x < -20 || this.x > canvas.width + 20) this.reset(false);

  }

  draw() {

    ctx.save();

    ctx.globalAlpha = Math.max(0, this.alpha);

    if (this.isPetal) {

      ctx.translate(this.x, this.y);

      ctx.rotate(this.angle);

      ctx.beginPath();

      ctx.ellipse(0, 0, this.size * 2.2, this.size * 1.1, 0, 0, Math.PI * 2);

      ctx.fillStyle = this.color + '0.9)';

      ctx.fill();

    } else {

      ctx.fillStyle = this.color + '1)';

      ctx.beginPath();

      ctx.arc(this.x, this.y, this.size * 0.7, 0, Math.PI * 2);

      ctx.fill();

      if (this.size > 1.5) {

        ctx.shadowBlur = 6;

        ctx.shadowColor = this.color + '0.8)';

        ctx.fill();

        ctx.shadowBlur = 0;

      }

    }

    ctx.restore();

  }

}



const COUNT = Math.min(160, Math.floor(window.innerWidth * window.innerHeight / 8000));

const particles = Array.from({ length: COUNT }, () => new Particle());



let t = 0;

function loop() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  t += 0.5;

  for (const p of particles) { p.update(t); p.draw(); }

  requestAnimationFrame(loop);

}

loop();

</script>

</body>

</html>
